<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人民城轨2.0 - 运营管理后台</title>
    
    <!-- Ant Design CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@4.24.15/dist/antd.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
        }
        
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            background: #fff;
        }
        
        .loading-content {
            text-align: center;
            padding: 40px;
        }
        
        .loading-icon {
            font-size: 48px;
            margin-bottom: 16px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .app-container {
            min-height: 100vh;
        }
        
        .main-nav {
            background: #fff;
            border-right: 1px solid #f0f0f0;
            overflow-y: auto;
        }
        
        .page-fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .page-header {
            margin-bottom: 24px;
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }
        
        .page-title {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 600;
            color: #262626;
        }
        
        .page-description {
            margin: 0;
            color: #8c8c8c;
            font-size: 14px;
        }
        
        .error-boundary {
            padding: 48px 24px;
            background: #fff;
            border: 2px solid #ff4d4f;
            border-radius: 8px;
            margin: 24px;
            text-align: center;
        }
        
        .error-boundary h2 {
            color: #ff4d4f;
            margin-bottom: 16px;
        }
        
        .error-boundary p {
            color: #666;
            margin-bottom: 16px;
        }
        
        .error-boundary button {
            padding: 8px 16px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .error-boundary button:hover {
            background: #40a9ff;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-spinner">
            <div class="loading-content">
                <div class="loading-icon">🚇</div>
                <div style="font-size: 20px; font-weight: bold; margin-bottom: 16px;">人民城轨2.0运营管理后台</div>
                <div style="color: #8c8c8c;">正在初始化系统...</div>
            </div>
        </div>
    </div>

    <!-- React 和依赖库 -->
    <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/antd@4.24.15/dist/antd-with-locales.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

    <!-- 工具类 - 必须首先加载 -->
    <script src="js/utils/mockData.js"></script>
    <script src="js/utils/auth.js"></script>
    
    <!-- 基础组件 -->
    <script src="js/components/ErrorBoundary.js"></script>
    <script src="js/components/LoginPage.js"></script>
    <script src="js/components/Navigation.js"></script>
    <script src="js/components/TopBar.js"></script>
    
    <!-- 页面组件 -->
    <script src="js/pages/Dashboard.js"></script>
    <script src="js/pages/ContentManagement.js"></script>
    <script src="js/pages/ReviewManagement.js"></script>
    <script src="js/pages/AuditFlowManagement.js"></script>
    <script src="js/pages/AdminManagement.js"></script>
    <script src="js/pages/LiveManagement.js"></script>
    <script src="js/pages/UserManagement.js"></script>
    <script src="js/pages/FeedbackManagement.js"></script>
    <script src="js/pages/MessageManagement.js"></script>
    <script src="js/pages/VersionManagement.js"></script>
    <script src="js/pages/BoothManagement.js"></script>
    <script src="js/pages/UserProfile.js"></script>
    <script src="js/pages/BehaviorStats.js"></script>
    <script src="js/pages/OperationalStats.js"></script>
    <script src="js/pages/DataManagement.js"></script>
    <script src="js/pages/TrafficAllocation.js"></script>
    <script src="js/pages/LogManagement.js"></script>
    <script src="js/pages/SystemSettings.js"></script>
    <script src="js/pages/ContentStats.js"></script>
    <script src="js/pages/UserProfileAnalysis.js"></script>
    
    <!-- 主应用 - 必须最后加载 -->
    <script src="js/App.js"></script>

    <script>
        // 全局错误处理
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.error);
        });
        
        window.addEventListener('unhandledrejection', function(e) {
            console.error('Unhandled promise rejection:', e.reason);
        });

        // 启动应用
        window.addEventListener('load', function() {
            try {
                console.log('🚀 启动人民城轨2.0运营管理后台...');
                ReactDOM.render(React.createElement(App), document.getElementById('app'));
                console.log('✅ 应用启动成功!');
            } catch (error) {
                console.error('❌ 应用启动失败:', error);
                document.getElementById('app').innerHTML = `
                    <div class="error-boundary">
                        <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
                        <h2>应用启动失败</h2>
                        <p style="margin: 16px 0; color: #6b7280;">${error.message}</p>
                        <button onclick="location.reload()" style="
                            padding: 8px 16px; 
                            background: #2563eb; 
                            color: white; 
                            border: none; 
                            border-radius: 4px; 
                            cursor: pointer;
                            font-size: 14px;
                        ">重新加载</button>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
